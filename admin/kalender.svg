<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0d1117"/>
  
  <!-- Calendar body -->
  <rect x="8" y="14" width="48" height="44" rx="6" fill="none" stroke="#30363d" stroke-width="2"/>
  <rect x="8" y="14" width="48" height="44" rx="6" fill="#161b22"/>

  <!-- Header bar -->
  <rect x="8" y="14" width="48" height="16" rx="6" fill="#1f6feb"/>
  <rect x="8" y="22" width="48" height="8" fill="#1f6feb"/>

  <!-- Ring clips left -->
  <rect x="18" y="8" width="6" height="12" rx="3" fill="#58a6ff"/>
  <!-- Ring clips right -->
  <rect x="40" y="8" width="6" height="12" rx="3" fill="#58a6ff"/>

  <!-- Month label -->
  <text x="32" y="26" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="7" font-weight="700" fill="white">MÄRZ 2026</text>

  <!-- Day grid dots -->
  <!-- Row 1 -->
  <rect x="14" y="36" width="5" height="5" rx="1" fill="#30363d"/>
  <rect x="21" y="36" width="5" height="5" rx="1" fill="#30363d"/>
  <rect x="28" y="36" width="5" height="5" rx="1" fill="#30363d"/>
  <rect x="35" y="36" width="5" height="5" rx="1" fill="#58a6ff" opacity=".9"/>
  <rect x="42" y="36" width="5" height="5" rx="1" fill="#3fb950" opacity=".9"/>

  <!-- Row 2 -->
  <rect x="14" y="44" width="5" height="5" rx="1" fill="#30363d"/>
  <rect x="21" y="44" width="5" height="5" rx="1" fill="#f0883e" opacity=".9"/>
  <rect x="28" y="44" width="5" height="5" rx="1" fill="#30363d"/>
  <rect x="35" y="44" width="5" height="5" rx="1" fill="#30363d"/>
  <rect x="42" y="44" width="5" height="5" rx="1" fill="#30363d"/>

  <!-- Today highlight -->
  <rect x="14" y="36" width="5" height="5" rx="1" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity=".6"/>

  <!-- Bottom row partial -->
  <rect x="14" y="52" width="5" height="4" rx="1" fill="#30363d"/>
  <rect x="21" y="52" width="5" height="4" rx="1" fill="#30363d"/>
  <rect x="28" y="52" width="5" height="4" rx="1" fill="#30363d"/>
</svg>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0;url=http://localhost:8095">
    <title>ioBroker Kalender – Weiterleitung</title>
    <style>
        body { background: #0d1117; color: #e6edf3; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { text-align: center; }
        .spinner { width: 36px; height: 36px; border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #8b949e; font-size: 14px; margin: 8px 0; }
        a { color: #58a6ff; }
    </style>
</head>
<body>
<div class="box">
    <div class="spinner"></div>
    <p>Weiterleitung zum Kalender-Dashboard...</p>
    <p><a id="link" href="#">Direkt öffnen</a></p>
</div>
<script>
    var port = 8095;
    var target = window.location.protocol + '//' + window.location.hostname + ':' + port;
    document.getElementById('link').href = target;
    window.location.replace(target);
</script>
</body>
</html>
